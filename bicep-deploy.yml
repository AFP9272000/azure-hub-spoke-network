trigger:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: azureServiceConnection
    value: 'azure-hub-spoke-oidc'
  - name: location
    value: 'eastus'
  - name: resourceGroupName
    value: 'hub-spoke-rg'
  - name: bicepDir
    value: 'bicep'

stages:
  - stage: Validate
    displayName: 'Validate & Scan'
    jobs:
      - job: ValidateBicep
        displayName: 'Validate Bicep Templates'
        steps:
          - task: AzureCLI@2
            displayName: 'Bicep Build (Compile Check)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az bicep build --file $(bicepDir)/main.bicep
                echo "Bicep compilation successful"

          - task: AzureCLI@2
            displayName: 'Bicep What-If (Preview Changes)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment sub what-if \
                  --location $(location) \
                  --template-file $(bicepDir)/main.bicep \
                  --parameters $(bicepDir)/parameters/dev.bicepparam \
                  --parameters sshPublicKey="$(sshPublicKey)"

      - job: SecurityScan
        displayName: 'Security Scanning'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'

          - script: |
              pip install checkov
              checkov -d $(bicepDir) --framework bicep --output sarif --output-file-path checkov-results.sarif || true
            displayName: 'Checkov Scan'

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy config $(bicepDir) --format sarif --output trivy-results.sarif || true
            displayName: 'Trivy IaC Scan'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Scan Results'
            inputs:
              PathtoPublish: '.'
              ArtifactName: 'security-scan-results'
            condition: always()

  - stage: Deploy
    displayName: 'Deploy Infrastructure'
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployBicep
        displayName: 'Deploy Bicep Templates'
        environment: 'hub-spoke-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy Bicep to Azure'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az deployment sub create \
                        --location $(location) \
                        --template-file $(bicepDir)/main.bicep \
                        --parameters $(bicepDir)/parameters/dev.bicepparam \
                        --parameters sshPublicKey="$(sshPublicKey)" \
                        --name "hub-spoke-$(Build.BuildId)"

                - task: AzureCLI@2
                  displayName: 'Verify Deployment'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Deployment Outputs:"
                      az deployment sub show \
                        --name "hub-spoke-$(Build.BuildId)" \
                        --query properties.outputs -o json

                      echo ""
                      echo "Resource Group Resources:"
                      az resource list \
                        --resource-group $(resourceGroupName) \
                        --output table

                      echo ""
                      echo "Firewall Status:"
                      az network firewall show \
                        --name fw-hub \
                        --resource-group $(resourceGroupName) \
                        --query "{Name:name, ProvisioningState:provisioningState, PrivateIP:ipConfigurations[0].properties.privateIPAddress}" \
                        -o table

                      echo ""
                      echo "Front Door Status:"
                      az afd profile show \
                        --profile-name fd-hubspoke \
                        --resource-group $(resourceGroupName) \
                        --query "{Name:name, State:provisioningState, SKU:sku.name}" \
                        -o table
